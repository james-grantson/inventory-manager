<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Edit Links</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
    <div class="container mx-auto px-4 py-8">
        <h1 class="text-2xl font-bold mb-6">Test Edit Links</h1>
        
        <div class="bg-white p-6 rounded-lg shadow-lg">
            <h2 class="text-xl font-semibold mb-4">Products</h2>
            <div id="products" class="space-y-2">
                Loading...
            </div>
        </div>
    </div>

    <script>
        async function loadProducts() {
            try {
                const res = await fetch('/api/products');
                const data = await res.json();
                const products = data.products || [];
                
                const html = products.map(p => `
                    <div class="flex items-center justify-between p-3 bg-gray-50 rounded">
                        <span>${p.name} (${p.sku})</span>
                        <a href="/editproduct.html?id=${p.id}" class="text-blue-600 hover:underline">Edit</a>
                    </div>
                `).join('');
                
                document.getElementById('products').innerHTML = html || '<p>No products found</p>';
            } catch (err) {
                document.getElementById('products').innerHTML = 'Error loading products';
            }
        }
        
        loadProducts();
    </script>
</body>
</html>
