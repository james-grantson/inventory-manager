<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Product</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
    <div class="container mx-auto px-4 py-8 max-w-2xl">
        <a href="/" class="text-blue-600 mb-4 inline-block"> Back to Dashboard</a>
        <h1 class="text-2xl font-bold mb-6">Edit Product</h1>
        
        <div id="loading" class="text-center py-8">Loading...</div>
        
        <form id="productForm" class="bg-white p-6 rounded-lg shadow-lg hidden">
            <div class="mb-4">
                <label class="block text-gray-700 mb-2">Product Name *</label>
                <input type="text" id="name" required class="w-full p-2 border rounded">
            </div>
            
            <div class="mb-4">
                <label class="block text-gray-700 mb-2">SKU</label>
                <input type="text" id="sku" class="w-full p-2 border rounded">
            </div>
            
            <div class="mb-4">
                <label class="block text-gray-700 mb-2">Description</label>
                <textarea id="description" rows="3" class="w-full p-2 border rounded"></textarea>
            </div>
            
            <div class="mb-4">
                <label class="block text-gray-700 mb-2">Category *</label>
                <input type="text" id="category" required class="w-full p-2 border rounded">
            </div>
            
            <div class="grid grid-cols-2 gap-4 mb-4">
                <div>
                    <label class="block text-gray-700 mb-2">Price (GH) *</label>
                    <input type="number" id="price" step="0.01" required class="w-full p-2 border rounded">
                </div>
                <div>
                    <label class="block text-gray-700 mb-2">Cost (GH) *</label>
                    <input type="number" id="cost" step="0.01" required class="w-full p-2 border rounded">
                </div>
            </div>
            
            <div class="grid grid-cols-2 gap-4 mb-4">
                <div>
                    <label class="block text-gray-700 mb-2">Quantity *</label>
                    <input type="number" id="quantity" required class="w-full p-2 border rounded">
                </div>
                <div>
                    <label class="block text-gray-700 mb-2">Min Stock *</label>
                    <input type="number" id="minstock" value="10" class="w-full p-2 border rounded">
                </div>
            </div>
            
            <div class="mb-4">
                <label class="block text-gray-700 mb-2">Supplier</label>
                <input type="text" id="supplier" class="w-full p-2 border rounded">
            </div>
            
            <div class="mb-4">
                <label class="block text-gray-700 mb-2">Location</label>
                <input type="text" id="location" class="w-full p-2 border rounded">
            </div>
            
            <div class="mb-4">
                <label class="block text-gray-700 mb-2">Image URL</label>
                <input type="url" id="image_url" class="w-full p-2 border rounded">
            </div>
            
            <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded hover:bg-blue-700">
                Update Product
            </button>
        </form>
    </div>

    <script>
        const productId = window.location.pathname.split('/').pop();
        
        async function loadProduct() {
            try {
                const res = await fetch(`/api/products/${productId}`);
                if (!res.ok) throw new Error('Failed to load product');
                
                const data = await res.json();
                const product = data.product || data;
                
                document.getElementById('name').value = product.name || '';
                document.getElementById('sku').value = product.sku || '';
                document.getElementById('description').value = product.description || '';
                document.getElementById('category').value = product.category || '';
                document.getElementById('price').value = product.price || '';
                document.getElementById('cost').value = product.cost || '';
                document.getElementById('quantity').value = product.quantity || '';
                document.getElementById('minstock').value = product.minstock || 10;
                document.getElementById('supplier').value = product.supplier || '';
                document.getElementById('location').value = product.location || '';
                document.getElementById('image_url').value = product.image_url || '';
                
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('productForm').classList.remove('hidden');
            } catch (err) {
                document.getElementById('loading').innerHTML = 'Error loading product: ' + err.message;
            }
        }
        
        document.getElementById('productForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const productData = {
                name: document.getElementById('name').value,
                sku: document.getElementById('sku').value,
                description: document.getElementById('description').value,
                category: document.getElementById('category').value,
                price: parseFloat(document.getElementById('price').value),
                cost: parseFloat(document.getElementById('cost').value),
                quantity: parseInt(document.getElementById('quantity').value),
                minstock: parseInt(document.getElementById('minstock').value) || 10,
                supplier: document.getElementById('supplier').value,
                location: document.getElementById('location').value,
                image_url: document.getElementById('image_url').value || null
            };
            
            try {
                const res = await fetch(`/api/products/${productId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(productData)
                });
                
                if (!res.ok) throw new Error('Failed to update product');
                
                alert('Product updated successfully!');
                window.location.href = '/products';
            } catch (err) {
                alert('Error: ' + err.message);
            }
        });
        
        loadProduct();
    </script>
</body>
</html>
